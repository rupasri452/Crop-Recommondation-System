<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Your Crop</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<header>
    <nav>
        <h2 class="logo">🌱 OptiCrop</h2>

        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/findcrop">Find Crop</a></li>
        </ul>
    </nav>
</header>

<section class="predict-section">

<div class="predict-box">

<h1>🌾 Find Your Best Crop</h1>

<p>
Enter the agricultural parameters below to get the most suitable crop recommendation.
</p>

<form action="/predict" method="POST">

<div class="form-grid">

<div>
<label>Nitrogen (N)</label>
<input type="number" name="N" required>
</div>

<div>
<label>Phosphorous (P)</label>
<input type="number" name="P" required>
</div>

<div>
<label>Potassium (K)</label>
<input type="number" name="K" required>
</div>

<div>
<label>Temperature (°C)</label>
<input type="number" step="0.01" name="temperature" required>
</div>

<div>
<label>Humidity (%)</label>
<input type="number" step="0.01" name="humidity" required>
</div>

<div>
<label>Soil pH</label>
<input type="number" step="0.01" name="ph" required>
</div>

<div>
<label>Rainfall (mm)</label>
<input type="number" step="0.01" name="rainfall" required>
</div>

</div>

<center>

<button type="submit">

🌱 Predict Crop

</button>

</center>

</form>

</div>

</section>

<footer>

<p>

© 2026 OptiCrop | AI Powered Crop Recommendation System

</p>

</footer>

</body>

</html>
